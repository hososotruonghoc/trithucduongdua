body{font-family:&amp;#x27;Quicksand&amp;#x27;,sans-serif;background:linear-gradient(135deg,#e0f2fe 0%,#bae6fd 30%,#e0f7fa 60%,#f0fdf4 100%);min-height:100vh;color:#1e293b}
.container{max-width:1200px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:clamp(2.5em,6vw,4em);text-align:center;color:#ea580c;text-shadow:2px 2px 0 rgba(234,88,12,.1);margin-bottom:4px}
.subtitle{text-align:center;font-size:1.2em;color:#64748b;margin-bottom:16px;font-weight:600}
.gv-banner{background:linear-gradient(135deg,#dbeafe,#e0f2fe);border:2px solid #60a5fa;border-radius:16px;padding:12px 20px;margin-bottom:16px;font-size:1em;color:#1e40af;text-align:center;width:100%;max-width:800px}
.gv-banner strong{color:#dc2626}
.setup-card{background:white;border-radius:24px;padding:30px;width:100%;max-width:650px;box-shadow:0 8px 32px rgba(0,0,0,.08);border:2px solid #e2e8f0}
.setup-card label{display:block;font-weight:700;font-size:1.15em;margin:16px 0 6px;color:#1e40af}
.setup-card select,.setup-card input{width:100%;padding:14px 18px;border-radius:14px;border:2px solid #cbd5e1;background:#f8fafc;font-size:1.1em;font-family:&amp;#x27;Quicksand&amp;#x27;,sans-serif;font-weight:600;outline:none;transition:.3s;color:#334155}
.setup-card select:focus,.setup-card input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.setup-card select option{background:white}
.team-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:18px 44px;border:none;border-radius:16px;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.6em;cursor:pointer;transition:all .3s}
.btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}
.btn-start{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;width:100%;margin-top:20px}
.btn-answer{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.btn-next{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white}
.btn-restart{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.game-area{width:100%;max-width:1000px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.score-board{display:flex;gap:10px;flex-wrap:wrap}
.team-score{padding:12px 26px;border-radius:14px;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.4em;border:3px solid #e2e8f0;background:white;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.team-score.active{border-color:#f59e0b;background:#fffbeb;box-shadow:0 4px 16px rgba(245,158,11,.15)}
.round-info{font-size:1.3em;color:#1e40af;padding:10px 20px;border-radius:14px;background:white;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.timer-ring{width:180px;height:180px;margin:0 auto 16px;position:relative}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:8;cx:75;cy:75;r:66}
.timer-bg{stroke:#e2e8f0}
.timer-progress{stroke:#3b82f6;stroke-dasharray:414.69;stroke-dashoffset:0;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
.timer-progress.warning{stroke:#f59e0b}
.timer-progress.danger{stroke:#ef4444}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:3.8em;font-weight:800;color:#1e293b}
.question-card{background:white;border:3px solid #e2e8f0;border-radius:28px;padding:40px 36px;text-align:center;margin-bottom:16px;transition:all .4s;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.question-card.correct-flash{border-color:#22c55e;box-shadow:0 0 40px rgba(34,197,94,.25);background:#f0fdf4}
.question-card.wrong-flash{border-color:#ef4444;box-shadow:0 0 40px rgba(239,68,68,.2);background:#fef2f2;animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.question-expression{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:clamp(3.5em,8vw,6em);font-weight:800;margin:8px 0 20px;color:#1e293b;letter-spacing:3px}
.answer-area{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.answer-input{width:280px;padding:20px 28px;font-size:2.5em;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;text-align:center;border-radius:16px;border:3px solid #cbd5e1;background:#f8fafc;color:#1e293b;outline:none;transition:.3s}
.answer-input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
.answer-input.correct{border-color:#22c55e;background:#f0fdf4}
.answer-input.wrong{border-color:#ef4444;background:#fef2f2}
.feedback{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:2.2em;margin-top:16px;min-height:50px}
.feedback.correct{color:#16a34a}
.feedback.wrong{color:#dc2626}
.controls{display:flex;justify-content:center;gap:14px;margin-top:12px;flex-wrap:wrap}
.result-card{background:white;border-radius:28px;padding:36px;box-shadow:0 8px 32px rgba(0,0,0,.08);text-align:center;width:100%;max-width:700px;border:2px solid #e2e8f0}
.trophy{font-size:5em;margin-bottom:8px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.result-title{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:2.2em;color:#ea580c;margin-bottom:16px}
.result-table{width:100%;border-collapse:separate;border-spacing:0 8px;margin:16px 0}
.result-table th{padding:10px;text-align:left;color:#1e40af;font-size:1em;border-bottom:2px solid #e2e8f0}
.result-table td{padding:12px;font-size:1.15em;background:#f8fafc;border-radius:10px}
.result-table tr:first-child td{background:#fffbeb;font-weight:700}
.winner-name{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:2em;color:#ea580c;margin:8px 0}
.hidden{display:none!important}
.confetti-piece{position:fixed;width:10px;height:20px;top:-20px;z-index:100;animation:confettiFall var(--fall-duration) linear forwards}
@keyframes confettiFall{to{top:110vh;transform:rotate(var(--rotation))}}
@media(max-width:600px){h1{font-size:2.2em}.question-expression{font-size:2.8em}.answer-input{width:160px;font-size:1.5em}.timer-ring{width:110px;height:110px}.timer-text{font-size:2.2em}}

// === SOUND ENGINE ===
let _aC,_sOn=true;
function _iA(){if(!_aC)_aC=new(window.AudioContext||window.webkitAudioContext)()}
function _pT(f,d,t,v){if(!_sOn)return;_iA();const o=_aC.createOscillator(),g=_aC.createGain();o.type=t||&amp;#x27;sine&amp;#x27;;o.frequency.value=f;g.gain.value=v||.15;g.gain.exponentialRampToValueAtTime(.001,_aC.currentTime+d);o.connect(g);g.connect(_aC.destination);o.start();o.stop(_aC.currentTime+d)}
function sndOk(){_pT(523,.08,&amp;#x27;sine&amp;#x27;,.22);setTimeout(()=&amp;gt;_pT(659,.08,&amp;#x27;sine&amp;#x27;,.22),80);setTimeout(()=&amp;gt;_pT(784,.15,&amp;#x27;sine&amp;#x27;,.22),160)}
function sndNo(){_pT(200,.25,&amp;#x27;sawtooth&amp;#x27;,.12)}
function sndTick(){_pT(1000,.04,&amp;#x27;sine&amp;#x27;,.08)}
function sndUrgent(){_pT(880,.06,&amp;#x27;square&amp;#x27;,.1);setTimeout(()=&amp;gt;_pT(880,.06,&amp;#x27;square&amp;#x27;,.1),120)}
function sndStart(){_pT(440,.1,&amp;#x27;sine&amp;#x27;,.15);setTimeout(()=&amp;gt;_pT(554,.1,&amp;#x27;sine&amp;#x27;,.15),100);setTimeout(()=&amp;gt;_pT(659,.15,&amp;#x27;sine&amp;#x27;,.15),200)}
function sndWin(){[523,587,659,784,1047].forEach((f,i)=&amp;gt;setTimeout(()=&amp;gt;_pT(f,.18,&amp;#x27;sine&amp;#x27;,.2),i*100))}

let config={},state={};
function updateTeamInputs(){const n=parseInt(document.getElementById(&amp;#x27;teamCount&amp;#x27;).value),c=document.getElementById(&amp;#x27;teamNames&amp;#x27;);c.innerHTML=&amp;#x27;&amp;#x27;;for(let i=1;i&amp;lt;=n;i++){const inp=document.createElement(&amp;#x27;input&amp;#x27;);inp.type=&amp;#x27;text&amp;#x27;;inp.placeholder=&amp;#x27;Tên Tổ &amp;#x27;+i;inp.value=&amp;#x27;Tổ &amp;#x27;+i;inp.className=&amp;#x27;team-name&amp;#x27;;c.appendChild(inp)}}
function rnd(min,max,dec=1){const f=Math.pow(10,dec);return Math.round((Math.random()*(max-min)+min)*f)/f}
function genAddSub(){const op=Math.random()&amp;gt;.5?&amp;#x27;+&amp;#x27;:&amp;#x27;−&amp;#x27;;let a,b,ans;if(op===&amp;#x27;+&amp;#x27;){a=rnd(1,50);b=rnd(1,50);ans=Math.round((a+b)*10)/10}else{a=rnd(10,80);b=rnd(1,a-.1);b=Math.round(b*10)/10;ans=Math.round((a-b)*10)/10}return{expr:`${fmt(a)} ${op} ${fmt(b)} = ?`,answer:ans,label:&amp;#x27;Tính nhẩm:&amp;#x27;}}
function genMul(){const a=rnd(1,20),b=Math.floor(Math.random()*9)+2;return{expr:`${fmt(a)} × ${b} = ?`,answer:Math.round(a*b*10)/10,label:&amp;#x27;Tính nhẩm:&amp;#x27;}}
function genDiv(){const b=Math.floor(Math.random()*8)+2,ans=rnd(1,30),a=Math.round(ans*b*10)/10;return{expr:`${fmt(a)} ÷ ${b} = ?`,answer:ans,label:&amp;#x27;Tính nhẩm:&amp;#x27;}}
function genPercent(){const p=[10,15,20,25,30,40,50,75][Math.floor(Math.random()*8)],base=[40,60,80,100,120,150,200,250,300,400,500][Math.floor(Math.random()*11)];return{expr:`${p}% của ${base} = ?`,answer:Math.round(base*p/100*10)/10,label:&amp;#x27;Tìm giá trị phần trăm:&amp;#x27;}}
function genFraction(){const d=[4,5,6,8,10][Math.floor(Math.random()*5)];let n1=Math.floor(Math.random()*(d-1))+1,n2=Math.floor(Math.random()*(d-1))+1;if(n1&amp;lt;n2)[n1,n2]=[n2,n1];const op=Math.random()&amp;gt;.5?&amp;#x27;+&amp;#x27;:&amp;#x27;−&amp;#x27;,ansN=op===&amp;#x27;+&amp;#x27;?n1+n2:n1-n2;return{expr:`${n1}/${d} ${op} ${n2}/${d} = ?`,answer:`${ansN}/${d}`,label:&amp;#x27;Tính:&amp;#x27;}}
function generateQuestion(){const t=config.mathType;if(t===&amp;#x27;add_sub&amp;#x27;)return genAddSub();if(t===&amp;#x27;mul&amp;#x27;)return genMul();if(t===&amp;#x27;div&amp;#x27;)return genDiv();if(t===&amp;#x27;percent&amp;#x27;)return genPercent();if(t===&amp;#x27;fraction&amp;#x27;)return genFraction();return[genAddSub,genMul,genDiv,genPercent][Math.floor(Math.random()*4)]()}
function fmt(n){return String(n).replace(&amp;#x27;.&amp;#x27;,&amp;#x27;,&amp;#x27;)}

const LABELS = [&amp;#x27;🎯&amp;#x27;,&amp;#x27;⭐&amp;#x27;,&amp;#x27;🎲&amp;#x27;,&amp;#x27;💡&amp;#x27;,&amp;#x27;🧩&amp;#x27;,&amp;#x27;🏆&amp;#x27;,&amp;#x27;🌟&amp;#x27;,&amp;#x27;🔥&amp;#x27;,&amp;#x27;💎&amp;#x27;,&amp;#x27;🎪&amp;#x27;];

let audioCtx,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t,v){if(!soundOn)return;initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||&amp;#x27;sine&amp;#x27;;o.frequency.value=f;g.gain.value=v||.15;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sndOk(){playTone(523,.08,&amp;#x27;sine&amp;#x27;,.2);setTimeout(()=&amp;gt;playTone(659,.08,&amp;#x27;sine&amp;#x27;,.2),80);setTimeout(()=&amp;gt;playTone(784,.15,&amp;#x27;sine&amp;#x27;,.2),160)}
function sndUrgent(){playTone(880,.06,&amp;#x27;square&amp;#x27;,.1);setTimeout(()=&amp;gt;playTone(880,.06,&amp;#x27;square&amp;#x27;,.1),120)}
function sndNo(){playTone(200,.25,&amp;#x27;sawtooth&amp;#x27;,.1)}
function sndSpin(){for(let i=0;i&amp;lt;8;i++)setTimeout(()=&amp;gt;playTone(400+i*50,.06,&amp;#x27;sine&amp;#x27;,.08),i*60)}
function sndWin(){[523,587,659,784].forEach((f,i)=&amp;gt;setTimeout(()=&amp;gt;playTone(f,.15,&amp;#x27;sine&amp;#x27;,.18),i*120))}

function startGame(){
  const lid = document.getElementById(&amp;#x27;lesson&amp;#x27;).value;
  const lname = document.getElementById(&amp;#x27;lesson&amp;#x27;).selectedOptions[0].text;
  cfg.questions = shuffle(QUESTIONS[lid]||QUESTIONS.b49);
  cfg.total = Math.min(parseInt(document.getElementById(&amp;#x27;numQ&amp;#x27;).value), cfg.questions.length);
  cfg.lessonName = lname;
  st = {qIdx:0, score:0, answered:false};

  document.getElementById(&amp;#x27;qTotal&amp;#x27;).textContent = cfg.total;
  drawWheel();
}

function drawWheel(){
  const canvas = document.getElementById(&amp;#x27;wheel&amp;#x27;);
  const ctx = canvas.getContext(&amp;#x27;2d&amp;#x27;);
  const cx=240, cy=240, r=230, n=cfg.total;
  ctx.clearRect(0,0,480,480);
  const slice = 2*Math.PI/n;
  for(let i=0;i&amp;lt;n;i++){
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r, wheelAngle+i*slice, wheelAngle+(i+1)*slice);
    ctx.fillStyle=COLORS[i%COLORS.length];
    ctx.fill();
    ctx.strokeStyle=&amp;#x27;white&amp;#x27;;ctx.lineWidth=2;ctx.stroke();
    // Label
    const mid = wheelAngle + (i+0.5)*slice;
    const lx = cx + (r*0.6)*Math.cos(mid);
    const ly = cy + (r*0.6)*Math.sin(mid);
    ctx.save();ctx.translate(lx,ly);ctx.rotate(mid);
    ctx.fillStyle=&amp;#x27;white&amp;#x27;;ctx.font=&amp;#x27;bold 30px sans-serif&amp;#x27;;ctx.textAlign=&amp;#x27;center&amp;#x27;;ctx.textBaseline=&amp;#x27;middle&amp;#x27;;
    ctx.fillText(LABELS[i%LABELS.length],0,0);
    ctx.restore();
  }
  // Center
  ctx.beginPath();ctx.arc(cx,cy,35,0,2*Math.PI);ctx.fillStyle=&amp;#x27;white&amp;#x27;;ctx.fill();
  ctx.strokeStyle=&amp;#x27;#e5e7eb&amp;#x27;;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=&amp;#x27;#b45309&amp;#x27;;ctx.font=&amp;#x27;bold 18px sans-serif&amp;#x27;;ctx.textAlign=&amp;#x27;center&amp;#x27;;ctx.fillText(&amp;#x27;QUAY&amp;#x27;,cx,cy+5);
}

function spin(){
  if(spinning || st.qIdx &amp;gt;= cfg.total) return;
  spinning = true; sndSpin();
  document.getElementById(&amp;#x27;btnSpin&amp;#x27;).disabled = true;
  document.getElementById(&amp;#x27;optsDiv&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;fb&amp;#x27;).textContent = &amp;#x27;&amp;#x27;;
  document.getElementById(&amp;#x27;qText&amp;#x27;).textContent = &amp;#x27;🎡 Đang quay...&amp;#x27;;
  document.getElementById(&amp;#x27;qCat&amp;#x27;).textContent = &amp;#x27;&amp;#x27;;

  const targetSlice = 2*Math.PI/cfg.total;
  const targetIdx = st.qIdx;
  const spins = 3 + Math.random()*3;
  const targetAngle = -(targetIdx * targetSlice + targetSlice/2) + spins*2*Math.PI - Math.PI/2;
  const startAngle = wheelAngle;
  const duration = 3000;
  const startTime = Date.now();

  function animate(){
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed/duration, 1);
    const ease = 1 - Math.pow(1-progress, 3);
    wheelAngle = startAngle + (targetAngle - startAngle) * ease;
    drawWheel();
    if(progress &amp;lt; 1) requestAnimationFrame(animate);
    else { spinning = false; showQuestion(); }
  }
  animate();
}

function showQuestion(){
  const q = cfg.questions[st.qIdx];
  st.answered = false;
  document.getElementById(&amp;#x27;qNum&amp;#x27;).textContent = st.qIdx+1;

  document.getElementById(&amp;#x27;qText&amp;#x27;).textContent = q.q;
  const od = document.getElementById(&amp;#x27;optsDiv&amp;#x27;);
  od.classList.remove(&amp;#x27;hidden&amp;#x27;);
  const labels = [&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;];
  od.innerHTML = q.o.map((o,i)=&amp;gt; `&amp;lt;div class=&amp;quot;opt&amp;quot; onclick=&amp;quot;answer(${i})&amp;quot; id=&amp;quot;o${i}&amp;quot;&amp;gt;${labels[i]}. ${o}&amp;lt;/div&amp;gt;`).join(&amp;#x27;&amp;#x27;);
}

function answer(idx){
  if(st.answered) return;
  st.answered = true;
  const q = cfg.questions[st.qIdx];
  const ok = idx === q.a;
  document.getElementById(&amp;#x27;o&amp;#x27;+idx).classList.add(ok?&amp;#x27;correct&amp;#x27;:&amp;#x27;wrong&amp;#x27;);
  document.getElementById(&amp;#x27;o&amp;#x27;+q.a).classList.add(&amp;#x27;correct&amp;#x27;);
  const fb = document.getElementById(&amp;#x27;fb&amp;#x27;);
  if(ok){st.score+=10; fb.className=&amp;#x27;fb ok&amp;#x27;; fb.textContent=&amp;#x27;🎉 Chính xác! +10 điểm&amp;#x27;;sndOk();}
  else{fb.className=&amp;#x27;fb no&amp;#x27;; sndNo(); fb.textContent=&amp;#x27;❌ Sai rồi! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][q.a];}
  document.getElementById(&amp;#x27;score&amp;#x27;).textContent = st.score;
  document.getElementById(&amp;#x27;btnSpin&amp;#x27;).disabled = false;
  st.qIdx++;
  if(st.qIdx &amp;gt;= cfg.total){
    document.getElementById(&amp;#x27;btnNext&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
    document.getElementById(&amp;#x27;btnNext&amp;#x27;).textContent = &amp;#x27;🏆 Xem kết quả&amp;#x27;;
    document.getElementById(&amp;#x27;btnSpin&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  } else {
    document.getElementById(&amp;#x27;btnNext&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
    document.getElementById(&amp;#x27;btnSpin&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  }
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i&amp;gt;0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// SOUND ENGINE
let audioCtx,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t,v){if(!soundOn)return;initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||&amp;#x27;sine&amp;#x27;;o.frequency.value=f;g.gain.value=v||.15;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sndOk(){playTone(523,.08,&amp;#x27;sine&amp;#x27;,.2);setTimeout(()=&amp;gt;playTone(659,.08,&amp;#x27;sine&amp;#x27;,.2),80);setTimeout(()=&amp;gt;playTone(784,.15,&amp;#x27;sine&amp;#x27;,.2),160)}
function sndUrgent(){playTone(880,.06,&amp;#x27;square&amp;#x27;,.1);setTimeout(()=&amp;gt;playTone(880,.06,&amp;#x27;square&amp;#x27;,.1),120)}
function sndNo(){playTone(200,.25,&amp;#x27;sawtooth&amp;#x27;,.1)}
function sndTick(){playTone(1000,.03,&amp;#x27;sine&amp;#x27;,.05)}
function sndWin(){[523,587,659,784].forEach((f,i)=&amp;gt;setTimeout(()=&amp;gt;playTone(f,.15,&amp;#x27;sine&amp;#x27;,.18),i*120))}

let cfg={},st={},timerInt;
function startGame(){
  const lid=document.getElementById(&amp;#x27;lesson&amp;#x27;).value;
  const lname=document.getElementById(&amp;#x27;lesson&amp;#x27;).selectedOptions[0].text;
  cfg.questions=shuffle(Q[lid]||Q.t35);
  cfg.total=cfg.questions.length;
  cfg.time=parseInt(document.getElementById(&amp;#x27;time&amp;#x27;).value);
  cfg.lessonName=lname;
  st={qIdx:0,score:0,answered:false};
  document.getElementById(&amp;#x27;setup&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;gameArea&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;qT&amp;#x27;).textContent=cfg.total;
  document.getElementById(&amp;#x27;lessonTag&amp;#x27;).textContent=lname.split(&amp;#x27;:&amp;#x27;)[0];
  showQ();
}

function showQ(){
  if(st.qIdx&amp;gt;=cfg.total){showResult();return}
  st.answered=false;
  const q=cfg.questions[st.qIdx];
  document.getElementById(&amp;#x27;qN&amp;#x27;).textContent=st.qIdx+1;
  document.getElementById(&amp;#x27;qNum&amp;#x27;).textContent=&amp;#x27;Câu &amp;#x27;+(st.qIdx+1)+&amp;#x27;/&amp;#x27;+cfg.total;
  document.getElementById(&amp;#x27;qLesson&amp;#x27;).textContent=q.t;
  document.getElementById(&amp;#x27;qText&amp;#x27;).textContent=q.q;
  document.getElementById(&amp;#x27;fb&amp;#x27;).textContent=&amp;#x27;&amp;#x27;;document.getElementById(&amp;#x27;fb&amp;#x27;).className=&amp;#x27;fb&amp;#x27;;
  document.getElementById(&amp;#x27;explain&amp;#x27;).classList.remove(&amp;#x27;show&amp;#x27;);
  document.getElementById(&amp;#x27;qCard&amp;#x27;).className=&amp;#x27;q-card&amp;#x27;;
  document.getElementById(&amp;#x27;btnNext&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;pbar&amp;#x27;).style.width=(st.qIdx/cfg.total*100)+&amp;#x27;%&amp;#x27;;
  const ctx=document.getElementById(&amp;#x27;qCtx&amp;#x27;);
  if(q.ctx){ctx.textContent=q.ctx;ctx.classList.remove(&amp;#x27;hidden&amp;#x27;)}else ctx.classList.add(&amp;#x27;hidden&amp;#x27;);
  const od=document.getElementById(&amp;#x27;optsDiv&amp;#x27;);
  const lb=[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;];
  od.innerHTML=q.o.map((o,i)=&amp;gt;`&amp;lt;div class=&amp;quot;opt&amp;quot; onclick=&amp;quot;ans(${i})&amp;quot; id=&amp;quot;o${i}&amp;quot;&amp;gt;${lb[i]}. ${o}&amp;lt;/div&amp;gt;`).join(&amp;#x27;&amp;#x27;);
  startTimer();
}

function ans(idx){
  if(st.answered)return;
  st.answered=true;clearInterval(timerInt);
  const q=cfg.questions[st.qIdx];
  const ok=idx===q.a;
  document.getElementById(&amp;#x27;o&amp;#x27;+idx).classList.add(ok?&amp;#x27;correct&amp;#x27;:&amp;#x27;wrong&amp;#x27;);
  document.getElementById(&amp;#x27;o&amp;#x27;+q.a).classList.add(&amp;#x27;correct&amp;#x27;);
  const fb=document.getElementById(&amp;#x27;fb&amp;#x27;);
  const card=document.getElementById(&amp;#x27;qCard&amp;#x27;);
  if(ok){st.score+=10;fb.className=&amp;#x27;fb ok&amp;#x27;;fb.textContent=&amp;#x27;🎉 Chính xác! +10 điểm&amp;#x27;;card.className=&amp;#x27;q-card ok&amp;#x27;;sndOk()}
  else{fb.className=&amp;#x27;fb no&amp;#x27;;sndNo();fb.textContent=&amp;#x27;❌ Sai! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][q.a];card.className=&amp;#x27;q-card no&amp;#x27;}
  document.getElementById(&amp;#x27;sc&amp;#x27;).textContent=st.score;
  if(q.ex){const el=document.getElementById(&amp;#x27;explain&amp;#x27;);el.textContent=&amp;#x27;💡 &amp;#x27;+q.ex;el.classList.add(&amp;#x27;show&amp;#x27;)}
  st.qIdx++;
  document.getElementById(&amp;#x27;btnNext&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;btnNext&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
}

function nextQ(){showQ()}

function startTimer(){
  clearInterval(timerInt);
  if(cfg.time===0){document.getElementById(&amp;#x27;timerEl&amp;#x27;).textContent=&amp;#x27;⏱️ ∞&amp;#x27;;return}
  let t=cfg.time;
  const el=document.getElementById(&amp;#x27;timerEl&amp;#x27;);
  el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;el.classList.remove(&amp;#x27;urgent&amp;#x27;);
  timerInt=setInterval(()=&amp;gt;{
    t--;el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;
    if(t&amp;lt;=5){el.classList.add(&amp;#x27;urgent&amp;#x27;);sndUrgent()}
    if(t&amp;lt;=0){clearInterval(timerInt);if(!st.answered){st.answered=true;
      document.getElementById(&amp;#x27;fb&amp;#x27;).className=&amp;#x27;fb no&amp;#x27;;
      document.getElementById(&amp;#x27;fb&amp;#x27;).textContent=&amp;#x27;⏰ Hết giờ! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][cfg.questions[st.qIdx].a];
      document.getElementById(&amp;#x27;o&amp;#x27;+cfg.questions[st.qIdx].a).classList.add(&amp;#x27;correct&amp;#x27;);
      document.getElementById(&amp;#x27;qCard&amp;#x27;).className=&amp;#x27;q-card no&amp;#x27;;
      st.qIdx++;document.getElementById(&amp;#x27;btnNext&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
      document.getElementById(&amp;#x27;btnNext&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
    }}
  },1000);
}

function showResult(){
  clearInterval(timerInt);
  document.getElementById(&amp;#x27;gameArea&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;resultArea&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  const pct=Math.round(st.score/(cfg.total*10)*100);
  const stars=Math.ceil(pct/20);
  sndWin();document.getElementById(&amp;#x27;resEmoji&amp;#x27;).textContent=pct&amp;gt;=80?&amp;#x27;🏆&amp;#x27;:pct&amp;gt;=50?&amp;#x27;🎉&amp;#x27;:&amp;#x27;💪&amp;#x27;;
  document.getElementById(&amp;#x27;resTitle&amp;#x27;).textContent=pct&amp;gt;=80?&amp;#x27;⭐ Xuất sắc!&amp;#x27;:pct&amp;gt;=50?&amp;#x27;👍 Khá tốt!&amp;#x27;:&amp;#x27;Cần ôn thêm!&amp;#x27;;
  document.getElementById(&amp;#x27;resStars&amp;#x27;).innerHTML=&amp;#x27;⭐&amp;#x27;.repeat(stars)+&amp;#x27;☆&amp;#x27;.repeat(5-stars);
  document.getElementById(&amp;#x27;resText&amp;#x27;).textContent=`Đạt ${st.score}/${cfg.total*10} điểm (${pct}%)`;
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i&amp;gt;0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function resetAll(){
  try{clearInterval(tmrI)}catch(e){}
  try{clearInterval(timerInt)}catch(e){}
  try{clearInterval(state.timerInterval)}catch(e){}
  document.getElementById(&amp;#x27;setup&amp;#x27;).style.display=&amp;#x27;&amp;#x27;;
  document.getElementById(&amp;#x27;setupScreen&amp;#x27;)&amp;amp;&amp;amp;(document.getElementById(&amp;#x27;setupScreen&amp;#x27;).style.display=&amp;#x27;&amp;#x27;);
  var ga=document.getElementById(&amp;#x27;gameArea&amp;#x27;);if(ga){ga.classList.add(&amp;#x27;hidden&amp;#x27;);ga.style.display=&amp;#x27;&amp;#x27;}
  var gs=document.getElementById(&amp;#x27;gameScreen&amp;#x27;);if(gs)gs.classList.add(&amp;#x27;hidden&amp;#x27;);
  var ra=document.getElementById(&amp;#x27;resArea&amp;#x27;);if(ra){ra.classList.add(&amp;#x27;hidden&amp;#x27;);ra.style.display=&amp;#x27;&amp;#x27;}
  var rs=document.getElementById(&amp;#x27;resultScreen&amp;#x27;);if(rs)rs.classList.add(&amp;#x27;hidden&amp;#x27;);
  var rr=document.getElementById(&amp;#x27;resultArea&amp;#x27;);if(rr){rr.classList.add(&amp;#x27;hidden&amp;#x27;);rr.style.display=&amp;#x27;&amp;#x27;}
  // Show setup
  var su=document.getElementById(&amp;#x27;setup&amp;#x27;)||document.getElementById(&amp;#x27;setupScreen&amp;#x27;);
  if(su){su.classList.remove(&amp;#x27;hidden&amp;#x27;);su.style.display=&amp;#x27;&amp;#x27;}
}

.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0)}
.btn-go{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;width:100%;margin-top:14px}
.btn-next{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white}
.hidden{display:none!important}
.game{width:100%}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.info{background:white;padding:7px 16px;border-radius:10px;font-weight:700;font-size:.95em;box-shadow:0 2px 6px rgba(0,0,0,.04);border:2px solid #bbf7d0}
.timer{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.9em;color:#15803d}

.sc{color:#15803d;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.15em}
.pbar{width:100%;height:10px;background:#e2e8f0;border-radius:5px;margin:6px 0 10px;overflow:hidden}
.pfill{height:100%;border-radius:5px;transition:width .4s;background:linear-gradient(90deg,#22c55e,#16a34a)}
.q-card{background:white;border-radius:20px;padding:28px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.05);border:2px solid #bbf7d0;margin-bottom:10px;transition:.4s}
.q-card.ok{border-color:#22c55e;background:#f0fdf4}.q-card.no{border-color:#ef4444;background:#fef2f2}
.q-num{font-size:.85em;color:#166534;font-weight:700}
.q-tag{display:inline-block;padding:3px 12px;border-radius:8px;font-weight:700;font-size:.8em;margin:4px 0;background:#dcfce7;color:#15803d}
.q-text{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:clamp(1.6em,3.5vw,2.6em);margin:10px 0 16px;color:#1e293b;line-height:1.3}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:800px;margin:0 auto}
.opt{padding:18px 22px;border-radius:14px;border:3px solid #e2e8f0;background:#f9fafb;font-size:clamp(1.1em,2vw,1.4em);font-weight:700;cursor:pointer;transition:.3s;text-align:center}
.opt:hover{border-color:#22c55e;background:#f0fdf4;transform:scale(1.02)}
.opt.correct{border-color:#22c55e;background:#dcfce7;color:#166534}
.opt.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
.fb{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.9em;margin:10px 0;min-height:36px}
.fb.ok{color:#16a34a}.fb.no{color:#dc2626}
.ex{font-size:.88em;color:#475569;margin-top:4px;background:#f8fafc;padding:8px 12px;border-radius:8px;display:none;max-width:700px;margin-left:auto;margin-right:auto}
.ex.show{display:block}
.ctrls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.result{background:white;border-radius:20px;padding:28px;max-width:500px;box-shadow:0 6px 24px rgba(0,0,0,.06);text-align:center;border:2px solid #86efac}
.stars{display:flex;justify-content:center;gap:3px;margin:10px 0;font-size:2em}
.vol-btn{position:fixed;bottom:12px;right:12px;z-index:100;width:40px;height:40px;border-radius:50%;border:2px solid #d1d5db;background:white;font-size:1.2em;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center}
@media(max-width:600px){.q-text{font-size:1.3em}.opts{grid-template-columns:1fr}}

let audioCtx,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t,v){if(!soundOn)return;initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||&amp;#x27;sine&amp;#x27;;o.frequency.value=f;g.gain.value=v||.15;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sndOk(){playTone(523,.08,&amp;#x27;sine&amp;#x27;,.2);setTimeout(()=&amp;gt;playTone(659,.08,&amp;#x27;sine&amp;#x27;,.2),80);setTimeout(()=&amp;gt;playTone(784,.15,&amp;#x27;sine&amp;#x27;,.2),160)}

function sndWin(){[523,587,659,784].forEach((f,i)=&amp;gt;setTimeout(()=&amp;gt;playTone(f,.15,&amp;#x27;sine&amp;#x27;,.18),i*120))}

let cfg={},st={},tmrI;
function startGame(){
  const lid=document.getElementById(&amp;#x27;lesson&amp;#x27;).value;
  const ln=document.getElementById(&amp;#x27;lesson&amp;#x27;).selectedOptions[0].text;
  cfg.questions=shuffle(Q[lid]||Q.cd19);
  cfg.total=cfg.questions.length;
  cfg.time=parseInt(document.getElementById(&amp;#x27;time&amp;#x27;).value);
  cfg.ln=ln;
  st={qIdx:0,score:0,ans:false};
  document.getElementById(&amp;#x27;setup&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;gameArea&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;qT&amp;#x27;).textContent=cfg.total;
  document.getElementById(&amp;#x27;lTag&amp;#x27;).textContent=ln.length&amp;gt;30?ln.substring(0,28)+&amp;#x27;...&amp;#x27;:ln;
  playTone(440,.1,&amp;#x27;sine&amp;#x27;,.15);setTimeout(()=&amp;gt;playTone(554,.1,&amp;#x27;sine&amp;#x27;,.15),100);setTimeout(()=&amp;gt;playTone(659,.15,&amp;#x27;sine&amp;#x27;,.15),200);
  showQ();
}
function showQ(){
  if(st.qIdx&amp;gt;=cfg.total){showRes();return}
  st.ans=false;
  const q=cfg.questions[st.qIdx];
  document.getElementById(&amp;#x27;qN&amp;#x27;).textContent=st.qIdx+1;
  document.getElementById(&amp;#x27;qNum&amp;#x27;).textContent=&amp;#x27;Câu &amp;#x27;+(st.qIdx+1)+&amp;#x27;/&amp;#x27;+cfg.total;
  document.getElementById(&amp;#x27;qTag&amp;#x27;).textContent=q.t;
  document.getElementById(&amp;#x27;qText&amp;#x27;).textContent=q.q;
  document.getElementById(&amp;#x27;fb&amp;#x27;).textContent=&amp;#x27;&amp;#x27;;document.getElementById(&amp;#x27;fb&amp;#x27;).className=&amp;#x27;fb&amp;#x27;;
  document.getElementById(&amp;#x27;ex&amp;#x27;).classList.remove(&amp;#x27;show&amp;#x27;);
  document.getElementById(&amp;#x27;qC&amp;#x27;).className=&amp;#x27;q-card&amp;#x27;;
  document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;pbar&amp;#x27;).style.width=(st.qIdx/cfg.total*100)+&amp;#x27;%&amp;#x27;;
  const od=document.getElementById(&amp;#x27;optsD&amp;#x27;);
  const lb=[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;];
  od.innerHTML=q.o.map((o,i)=&amp;gt;&amp;#x27;&amp;lt;div class=&amp;quot;opt&amp;quot; onclick=&amp;quot;ans(&amp;#x27;+i+&amp;#x27;)&amp;quot; id=&amp;quot;o&amp;#x27;+i+&amp;#x27;&amp;quot;&amp;gt;&amp;#x27;+lb[i]+&amp;#x27;. &amp;#x27;+o+&amp;#x27;&amp;lt;/div&amp;gt;&amp;#x27;).join(&amp;#x27;&amp;#x27;);
  startTmr();
}
function ans(idx){
  if(st.ans)return;st.ans=true;clearInterval(tmrI);
  const q=cfg.questions[st.qIdx];
  const ok=idx===q.a;
  document.getElementById(&amp;#x27;o&amp;#x27;+idx).classList.add(ok?&amp;#x27;correct&amp;#x27;:&amp;#x27;wrong&amp;#x27;);
  document.getElementById(&amp;#x27;o&amp;#x27;+q.a).classList.add(&amp;#x27;correct&amp;#x27;);
  const fb=document.getElementById(&amp;#x27;fb&amp;#x27;),card=document.getElementById(&amp;#x27;qC&amp;#x27;);
  if(ok){st.score+=10;fb.className=&amp;#x27;fb ok&amp;#x27;;fb.textContent=&amp;#x27;🎉 Chính xác! +10 điểm&amp;#x27;;card.className=&amp;#x27;q-card ok&amp;#x27;;sndOk()}
  else{fb.className=&amp;#x27;fb no&amp;#x27;;fb.textContent=&amp;#x27;❌ Sai! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][q.a];card.className=&amp;#x27;q-card no&amp;#x27;;sndNo()}
  document.getElementById(&amp;#x27;sc&amp;#x27;).textContent=st.score;
  if(q.ex){const el=document.getElementById(&amp;#x27;ex&amp;#x27;);el.textContent=&amp;#x27;💡 &amp;#x27;+q.ex;el.classList.add(&amp;#x27;show&amp;#x27;)}
  st.qIdx++;
  document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;btnN&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
}
function nextQ(){showQ()}
function startTmr(){
  clearInterval(tmrI);
  if(cfg.time===0){document.getElementById(&amp;#x27;tmr&amp;#x27;).textContent=&amp;#x27;⏱️ ∞&amp;#x27;;return}
  let t=cfg.time;const el=document.getElementById(&amp;#x27;tmr&amp;#x27;);
  el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;el.classList.remove(&amp;#x27;urgent&amp;#x27;);
  tmrI=setInterval(()=&amp;gt;{
    t--;el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;
    if(t&amp;lt;=5){el.classList.add(&amp;#x27;urgent&amp;#x27;);sndUrgent()}
    if(t&amp;lt;=0){clearInterval(tmrI);if(!st.ans){st.ans=true;sndNo();
      document.getElementById(&amp;#x27;fb&amp;#x27;).className=&amp;#x27;fb no&amp;#x27;;
      document.getElementById(&amp;#x27;fb&amp;#x27;).textContent=&amp;#x27;⏰ Hết giờ! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][cfg.questions[st.qIdx].a];
      document.getElementById(&amp;#x27;o&amp;#x27;+cfg.questions[st.qIdx].a).classList.add(&amp;#x27;correct&amp;#x27;);
      document.getElementById(&amp;#x27;qC&amp;#x27;).className=&amp;#x27;q-card no&amp;#x27;;
      st.qIdx++;document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
      document.getElementById(&amp;#x27;btnN&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
    }}
  },1000);
}
function showRes(){
  clearInterval(tmrI);sndWin();
  document.getElementById(&amp;#x27;gameArea&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;resArea&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  const pct=Math.round(st.score/(cfg.total*10)*100);
  const s=Math.ceil(pct/20);
  document.getElementById(&amp;#x27;rE&amp;#x27;).textContent=pct&amp;gt;=80?&amp;#x27;🏆&amp;#x27;:pct&amp;gt;=50?&amp;#x27;🎉&amp;#x27;:&amp;#x27;💪&amp;#x27;;
  document.getElementById(&amp;#x27;rT&amp;#x27;).textContent=pct&amp;gt;=80?&amp;#x27;⭐ Xuất sắc!&amp;#x27;:pct&amp;gt;=50?&amp;#x27;👍 Khá tốt!&amp;#x27;:&amp;#x27;Cần ôn thêm!&amp;#x27;;
  document.getElementById(&amp;#x27;rS&amp;#x27;).innerHTML=&amp;#x27;⭐&amp;#x27;.repeat(s)+&amp;#x27;☆&amp;#x27;.repeat(5-s);
  document.getElementById(&amp;#x27;rTx&amp;#x27;).textContent=&amp;#x27;Đạt &amp;#x27;+st.score+&amp;#x27;/&amp;#x27;+(cfg.total*10)+&amp;#x27; điểm (&amp;#x27;+pct+&amp;#x27;%)&amp;#x27;;
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i&amp;gt;0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function resetAll(){
  try{clearInterval(tmrI)}catch(e){}
  try{clearInterval(timerInt)}catch(e){}
  try{clearInterval(state.timerInterval)}catch(e){}
  document.getElementById(&amp;#x27;setup&amp;#x27;).style.display=&amp;#x27;&amp;#x27;;
  document.getElementById(&amp;#x27;setupScreen&amp;#x27;)&amp;amp;&amp;amp;(document.getElementById(&amp;#x27;setupScreen&amp;#x27;).style.display=&amp;#x27;&amp;#x27;);
  var ga=document.getElementById(&amp;#x27;gameArea&amp;#x27;);if(ga){ga.classList.add(&amp;#x27;hidden&amp;#x27;);ga.style.display=&amp;#x27;&amp;#x27;}
  var gs=document.getElementById(&amp;#x27;gameScreen&amp;#x27;);if(gs)gs.classList.add(&amp;#x27;hidden&amp;#x27;);
  var ra=document.getElementById(&amp;#x27;resArea&amp;#x27;);if(ra){ra.classList.add(&amp;#x27;hidden&amp;#x27;);ra.style.display=&amp;#x27;&amp;#x27;}
  var rs=document.getElementById(&amp;#x27;resultScreen&amp;#x27;);if(rs)rs.classList.add(&amp;#x27;hidden&amp;#x27;);
  var rr=document.getElementById(&amp;#x27;resultArea&amp;#x27;);if(rr){rr.classList.add(&amp;#x27;hidden&amp;#x27;);rr.style.display=&amp;#x27;&amp;#x27;}
  // Show setup
  var su=document.getElementById(&amp;#x27;setup&amp;#x27;)||document.getElementById(&amp;#x27;setupScreen&amp;#x27;);
  if(su){su.classList.remove(&amp;#x27;hidden&amp;#x27;);su.style.display=&amp;#x27;&amp;#x27;}

let cfg={},st={},tmrI;
function startGame(){
  const lid=document.getElementById(&amp;#x27;lesson&amp;#x27;).value;

  cfg.questions=shuffle(Q[lid]||Q[Object.keys(Q)[0]]);

  st={qIdx:0,score:0,ans:false};
  document.getElementById(&amp;#x27;setup&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;gameArea&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);

}
function showQ(){
  if(st.qIdx&amp;gt;=cfg.total){showRes();return}
  st.ans=false;const q=cfg.questions[st.qIdx];
  document.getElementById(&amp;#x27;qN&amp;#x27;).textContent=st.qIdx+1;
  document.getElementById(&amp;#x27;qNum&amp;#x27;).textContent=&amp;#x27;Câu &amp;#x27;+(st.qIdx+1)+&amp;#x27;/&amp;#x27;+cfg.total;
  document.getElementById(&amp;#x27;qTag&amp;#x27;).textContent=q.t;
  document.getElementById(&amp;#x27;qText&amp;#x27;).textContent=q.q;
  document.getElementById(&amp;#x27;fb&amp;#x27;).textContent=&amp;#x27;&amp;#x27;;document.getElementById(&amp;#x27;fb&amp;#x27;).className=&amp;#x27;fb&amp;#x27;;
  document.getElementById(&amp;#x27;ex&amp;#x27;).classList.remove(&amp;#x27;show&amp;#x27;);
  document.getElementById(&amp;#x27;qC&amp;#x27;).className=&amp;#x27;q-card&amp;#x27;;
  document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.add(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;pbar&amp;#x27;).style.width=(st.qIdx/cfg.total*100)+&amp;#x27;%&amp;#x27;;
  const lb=[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;];
  document.getElementById(&amp;#x27;optsD&amp;#x27;).innerHTML=q.o.map((o,i)=&amp;gt;&amp;#x27;&amp;lt;div class=&amp;quot;opt&amp;quot; onclick=&amp;quot;ans(&amp;#x27;+i+&amp;#x27;)&amp;quot; id=&amp;quot;o&amp;#x27;+i+&amp;#x27;&amp;quot;&amp;gt;&amp;#x27;+lb[i]+&amp;#x27;. &amp;#x27;+o+&amp;#x27;&amp;lt;/div&amp;gt;&amp;#x27;).join(&amp;#x27;&amp;#x27;);
  startTmr();
}
function ans(idx){
  if(st.ans)return;st.ans=true;clearInterval(tmrI);
  const q=cfg.questions[st.qIdx];const ok=idx===q.a;
  document.getElementById(&amp;#x27;o&amp;#x27;+idx).classList.add(ok?&amp;#x27;correct&amp;#x27;:&amp;#x27;wrong&amp;#x27;);
  document.getElementById(&amp;#x27;o&amp;#x27;+q.a).classList.add(&amp;#x27;correct&amp;#x27;);
  const fb=document.getElementById(&amp;#x27;fb&amp;#x27;),card=document.getElementById(&amp;#x27;qC&amp;#x27;);
  if(ok){st.score+=10;fb.className=&amp;#x27;fb ok&amp;#x27;;fb.textContent=&amp;#x27;🎉 Chính xác! +10 điểm&amp;#x27;;card.className=&amp;#x27;q-card ok&amp;#x27;;sndOk()}
  else{fb.className=&amp;#x27;fb no&amp;#x27;;fb.textContent=&amp;#x27;❌ Sai! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][q.a];card.className=&amp;#x27;q-card no&amp;#x27;;sndNo()}
  document.getElementById(&amp;#x27;sc&amp;#x27;).textContent=st.score;
  if(q.ex){const el=document.getElementById(&amp;#x27;ex&amp;#x27;);el.textContent=&amp;#x27;💡 &amp;#x27;+q.ex;el.classList.add(&amp;#x27;show&amp;#x27;)}
  st.qIdx++;document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;btnN&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
}

function startTmr(){
  clearInterval(tmrI);if(cfg.time===0){document.getElementById(&amp;#x27;tmr&amp;#x27;).textContent=&amp;#x27;⏱️ ∞&amp;#x27;;return}
  let t=cfg.time;const el=document.getElementById(&amp;#x27;tmr&amp;#x27;);el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;el.classList.remove(&amp;#x27;urgent&amp;#x27;);
  tmrI=setInterval(()=&amp;gt;{t--;el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;
    if(t&amp;lt;=5){el.classList.add(&amp;#x27;urgent&amp;#x27;);sndUrgent()}
    if(t&amp;lt;=0){clearInterval(tmrI);if(!st.ans){st.ans=true;sndNo();
      document.getElementById(&amp;#x27;fb&amp;#x27;).className=&amp;#x27;fb no&amp;#x27;;
      document.getElementById(&amp;#x27;fb&amp;#x27;).textContent=&amp;#x27;⏰ Hết giờ! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][cfg.questions[st.qIdx].a];
      document.getElementById(&amp;#x27;o&amp;#x27;+cfg.questions[st.qIdx].a).classList.add(&amp;#x27;correct&amp;#x27;);
      document.getElementById(&amp;#x27;qC&amp;#x27;).className=&amp;#x27;q-card no&amp;#x27;;
      st.qIdx++;document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
      document.getElementById(&amp;#x27;btnN&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
    }}
  },1000);
}
function showRes(){
  clearInterval(tmrI);sndWin();

  document.getElementById(&amp;#x27;resArea&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  const pct=Math.round(st.score/(cfg.total*10)*100);const s=Math.ceil(pct/20);
  document.getElementById(&amp;#x27;rE&amp;#x27;).textContent=pct&amp;gt;=80?&amp;#x27;🏆&amp;#x27;:pct&amp;gt;=50?&amp;#x27;🎉&amp;#x27;:&amp;#x27;💪&amp;#x27;;
  document.getElementById(&amp;#x27;rT&amp;#x27;).textContent=pct&amp;gt;=80?&amp;#x27;⭐ Xuất sắc!&amp;#x27;:pct&amp;gt;=50?&amp;#x27;👍 Khá tốt!&amp;#x27;:&amp;#x27;Cần ôn thêm!&amp;#x27;;

  document.getElementById(&amp;#x27;rTx&amp;#x27;).textContent=&amp;#x27;Đạt &amp;#x27;+st.score+&amp;#x27;/&amp;#x27;+(cfg.total*10)+&amp;#x27; điểm (&amp;#x27;+pct+&amp;#x27;%)&amp;#x27;;
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i&amp;gt;0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function ans(idx){
  if(st.ans)return;st.ans=true;clearInterval(tmrI);
  var q=cfg.questions[st.qIdx];var lv=LEVELS[q.d];var ok=idx===q.a;
  document.getElementById(&amp;#x27;o&amp;#x27;+idx).classList.add(ok?&amp;#x27;correct&amp;#x27;:&amp;#x27;wrong&amp;#x27;);
  document.getElementById(&amp;#x27;o&amp;#x27;+q.a).classList.add(&amp;#x27;correct&amp;#x27;);
  var fb=document.getElementById(&amp;#x27;fb&amp;#x27;),card=document.getElementById(&amp;#x27;qC&amp;#x27;);
  if(ok){
    st.score+=lv.pts;st.correct++;st.streak++;
    if(st.streak&amp;gt;st.maxStreak)st.maxStreak=st.streak;
    fb.className=&amp;#x27;fb ok&amp;#x27;;fb.textContent=&amp;#x27;🎉 +&amp;#x27;+lv.pts+&amp;#x27; điểm!&amp;#x27;;card.className=&amp;#x27;q-card ok&amp;#x27;;sndOk();
    if(st.streak&amp;gt;=3)sndStreak();
  }else{
    st.streak=0;
    fb.className=&amp;#x27;fb no&amp;#x27;;fb.textContent=&amp;#x27;❌ Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][q.a];card.className=&amp;#x27;q-card no&amp;#x27;;sndNo();
  }
  document.getElementById(&amp;#x27;sc&amp;#x27;).textContent=st.score;
  document.getElementById(&amp;#x27;streakEl&amp;#x27;).textContent=st.streak&amp;gt;1?&amp;#x27;🔥 Chuỗi &amp;#x27;+st.streak+&amp;#x27; câu đúng!&amp;#x27;:&amp;#x27;&amp;#x27;;
  st.qIdx++;document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
  document.getElementById(&amp;#x27;btnN&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
}

function startTmr(secs){
  clearInterval(tmrI);var t=secs;var el=document.getElementById(&amp;#x27;tmr&amp;#x27;);
  el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;el.classList.remove(&amp;#x27;urgent&amp;#x27;);
  tmrI=setInterval(function(){t--;el.textContent=&amp;#x27;⏱️ &amp;#x27;+t+&amp;#x27;s&amp;#x27;;
    if(t&amp;lt;=5){el.classList.add(&amp;#x27;urgent&amp;#x27;);sndUrgent()}
    if(t&amp;lt;=0){clearInterval(tmrI);if(!st.ans){st.ans=true;sndNo();st.streak=0;
      document.getElementById(&amp;#x27;fb&amp;#x27;).className=&amp;#x27;fb no&amp;#x27;;
      document.getElementById(&amp;#x27;fb&amp;#x27;).textContent=&amp;#x27;⏰ Hết giờ! Đáp án: &amp;#x27;+[&amp;#x27;A&amp;#x27;,&amp;#x27;B&amp;#x27;,&amp;#x27;C&amp;#x27;,&amp;#x27;D&amp;#x27;][cfg.questions[st.qIdx].a];
      document.getElementById(&amp;#x27;o&amp;#x27;+cfg.questions[st.qIdx].a).classList.add(&amp;#x27;correct&amp;#x27;);
      document.getElementById(&amp;#x27;qC&amp;#x27;).className=&amp;#x27;q-card no&amp;#x27;;
      document.getElementById(&amp;#x27;streakEl&amp;#x27;).textContent=&amp;#x27;&amp;#x27;;
      st.qIdx++;document.getElementById(&amp;#x27;btnN&amp;#x27;).classList.remove(&amp;#x27;hidden&amp;#x27;);
      document.getElementById(&amp;#x27;btnN&amp;#x27;).textContent=st.qIdx&amp;gt;=cfg.total?&amp;#x27;🏆 Xem kết quả&amp;#x27;:&amp;#x27;Câu tiếp ➜&amp;#x27;;
    }}
  },1000);
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i&amp;gt;0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

function openGame(id, name) {
  var src = document.getElementById(&#x27;game&#x27; + id).value;
  var blob = new Blob([src], {type: &#x27;text/html&#x27;});
  var url = URL.createObjectURL(blob);
  document.getElementById(&#x27;gf&#x27;).src = url;
  document.getElementById(&#x27;ov&#x27;).classList.add(&#x27;show&#x27;);
  document.getElementById(&#x27;cb&#x27;).classList.add(&#x27;show&#x27;);
  document.getElementById(&#x27;gl&#x27;).classList.add(&#x27;show&#x27;);
  document.getElementById(&#x27;gl&#x27;).textContent = name;
  document.body.style.overflow = &#x27;hidden&#x27;;
}

function closeGame() {
  var f = document.getElementById(&#x27;gf&#x27;);
  if (f.src) URL.revokeObjectURL(f.src);
  f.src = &#x27;&#x27;;
  document.getElementById(&#x27;ov&#x27;).classList.remove(&#x27;show&#x27;);
  document.getElementById(&#x27;cb&#x27;).classList.remove(&#x27;show&#x27;);
  document.getElementById(&#x27;gl&#x27;).classList.remove(&#x27;show&#x27;);
  document.body.style.overflow = &#x27;&#x27;;
}

function toggleList(btn) {
  var list = btn.nextElementSibling;
  var wasOpen = btn.classList.contains(&#x27;open&#x27;);
  var allBtns = document.querySelectorAll(&#x27;.dt.open&#x27;);
  for (var i = 0; i &lt; allBtns.length; i++) {
    if (allBtns[i] !== btn) {
      allBtns[i].classList.remove(&#x27;open&#x27;);
      allBtns[i].nextElementSibling.classList.remove(&#x27;open&#x27;);
      setToggleText(allBtns[i], false);
    }
  }
  btn.classList.toggle(&#x27;open&#x27;);
  list.classList.toggle(&#x27;open&#x27;);
  setToggleText(btn, !wasOpen);
}

function setToggleText(btn, isOpen) {
  var isRace = btn.closest(&#x27;.card-race&#x27;);
  if (isOpen) {
    btn.innerHTML = (isRace ? &#x27;📋 Ẩn bộ câu hỏi&#x27; : &#x27;📋 Ẩn danh sách&#x27;) + &#x27; &lt;span class=&quot;ta&quot; style=&quot;transform:rotate(180deg)&quot;&gt;▼&lt;/span&gt;&#x27;;
  } else {
    btn.innerHTML = (isRace ? &#x27;📋 Xem bộ câu hỏi có sẵn&#x27; : &#x27;📋 Xem danh sách trò chơi&#x27;) + &#x27; &lt;span class=&quot;ta&quot;&gt;▼&lt;/span&gt;&#x27;;
  }
}

// 3D tilt
var cards = document.querySelectorAll(&#x27;.card&#x27;);
for (var i = 0; i &lt; cards.length; i++) {
  (function(card) {
    card.addEventListener(&#x27;mousemove&#x27;, function(e) {
      var r = card.getBoundingClientRect();
      var x = (e.clientX - r.left) / r.width - 0.5;
      var y = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = &#x27;perspective(700px) rotateY(&#x27; + (x*8) + &#x27;deg) rotateX(&#x27; + (-y*8) + &#x27;deg) translateY(-6px) scale(1.015)&#x27;;
    });
    card.addEventListener(&#x27;mouseleave&#x27;, function() {
      card.style.transform = &#x27;&#x27;;
    });
  })(cards[i]);
}
&lt;/script&gt;

<script>
// ============================================================
// CẤU HÌNH: THAY URL NÀY BẰNG URL GOOGLE APPS SCRIPT CỦA BẠN
// ============================================================
var API_URL = 'https://script.google.com/macros/s/AKfycbxiBju4AP5PRFH2BESG2dwKMgCrJA9Iu4sc8QJ5WnezcrABoCIdlF_rRGXTM4Ro4cWKVQ/exec';
// ============================================================

function getDeviceId() {
  var id = localStorage.getItem('_device_id');
  if (!id) {
    id = 'DV-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('_device_id', id);
  }
  return id;
}

function checkSession() {
  var session = localStorage.getItem('_session');
  if (session) {
    try {
      var data = JSON.parse(session);
      if (data.user && data.pass && data.expires > Date.now()) {
        // Xác thực lại với server (nếu admin đổi mật khẩu → sẽ bị đăng xuất)
        var deviceId = getDeviceId();
        fetch(API_URL + '?action=login&user=' + encodeURIComponent(data.user) + '&pass=' + encodeURIComponent(data.pass) + '&device=' + encodeURIComponent(deviceId))
          .then(function(r) { return r.json(); })
          .then(function(result) {
            if (result.status === 'ok') {
              showGame();
            } else {
              localStorage.removeItem('_session');
            }
          })
          .catch(function() {
            // Mất mạng → vẫn cho dùng session cũ
            showGame();
          });
        return;
      }
    } catch(e) {}
    localStorage.removeItem('_session');
  }
}

function doLogin() {
  var user = document.getElementById('username').value.trim();
  var pass = document.getElementById('password').value.trim();
  var msg = document.getElementById('msg');
  var btn = document.getElementById('btnLogin');

  if (!user || !pass) {
    msg.className = 'msg error';
    msg.textContent = '⚠️ Vui lòng nhập đầy đủ tài khoản và mật khẩu!';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Đang kiểm tra...';
  msg.className = 'msg info';
  msg.textContent = '🔄 Đang xác thực...';

  var deviceId = getDeviceId();
  
  fetch(API_URL + '?action=login&user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass) + '&device=' + encodeURIComponent(deviceId))
    .then(function(response) { return response.json(); })
    .then(function(result) {
      if (result.status === 'ok') {
        msg.className = 'msg success';
        msg.textContent = '✅ Đăng nhập thành công!';
        localStorage.setItem('_session', JSON.stringify({
          user: user,
          pass: pass,
          expires: Date.now() + 24 * 60 * 60 * 1000
        }));
        setTimeout(function() { showGame(); }, 800);
      } else if (result.status === 'locked') {
        msg.className = 'msg error';
        msg.textContent = '🔒 Tài khoản đã kích hoạt trên máy khác! Liên hệ admin.';
      } else if (result.status === 'wrong') {
        msg.className = 'msg error';
        msg.textContent = '❌ Sai tài khoản hoặc mật khẩu!';
      } else if (result.status === 'expired') {
        msg.className = 'msg error';
        msg.textContent = '⏰ Tài khoản đã hết hạn!';
      } else {
        msg.className = 'msg error';
        msg.textContent = '❌ Lỗi: ' + (result.message || 'Không xác định');
      }
      btn.disabled = false;
      btn.innerHTML = '🔐 ĐĂNG NHẬP';
    })
    .catch(function(err) {
      msg.className = 'msg error';
      msg.textContent = '⚠️ Không kết nối được server! Kiểm tra mạng.';
      btn.disabled = false;
      btn.innerHTML = '🔐 ĐĂNG NHẬP';
    });
}

function showGame() {
  document.getElementById('loginWrap').style.display = 'none';
  var container = document.getElementById('gameContainer');
  var frame = document.getElementById('gameFrame');
  var gameHTML = document.getElementById('gameHTML').value;
  var blob = new Blob([gameHTML], {type: 'text/html'});
  frame.src = URL.createObjectURL(blob);
  container.classList.add('show');
  document.getElementById('logoutBtn').classList.add('show');
}

function doLogout() {
  localStorage.removeItem('_session');
  var f = document.getElementById('gameFrame');
  if (f.src) URL.revokeObjectURL(f.src);
  f.src = '';
  document.getElementById('gameContainer').classList.remove('show');
  document.getElementById('logoutBtn').classList.remove('show');
  document.getElementById('loginWrap').style.display = '';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('msg').className = 'msg';
  document.getElementById('msg').textContent = '';
}

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

checkSession();
</script>
